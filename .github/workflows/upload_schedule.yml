name: Upload Scheduled Clips

on:
  schedule:
    # Runs daily at 08:00 BRT = 11:00 UTC (before the first upload window)
    - cron: '0 11 * * *'   # Daily at 11:00 UTC = 08:00 BRT
  workflow_dispatch:  # manual trigger for testing

jobs:
  discover-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          pip install yt-dlp numpy requests playwright
          playwright install chromium

      - name: Install deno (JS runtime for yt-dlp)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Discover latest video and process clips
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: python clipcrafter/ci_discover.py

      - name: Commit new clips and queue changes
        run: |
          git config user.name "clipcrafter-bot"
          git config user.email "bot@clipcrafter"
          git add clipcrafter/scheduled_uploads/
          if git diff --cached --quiet; then
            echo "No new clips to commit"
          else
            git commit -m "Auto-add new clips from ci_discover"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:master
          fi

      - name: Upload scheduled clips
        env:
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_TOKEN_PICKLE: ${{ secrets.YT_TOKEN_PICKLE }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
          TT_COOKIES: ${{ secrets.TT_COOKIES }}
        run: python clipcrafter/ci_upload.py

      - name: Commit queue progress after upload
        run: |
          git config user.name "clipcrafter-bot"
          git config user.email "bot@clipcrafter"
          git add clipcrafter/scheduled_uploads/
          if git diff --cached --quiet; then
            echo "No changes after upload"
          else
            git commit -m "Auto-update queue cursor after upload"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:master
          fi
